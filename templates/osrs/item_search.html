<div class="window-content" id="item-search-window">
  <div class="title-bar" id="item-search-title-bar">
    <h4>Item Search</h4>
    <div>
      <button id="close-item-search-button" class="w98-button title-button">
        X
      </button>
    </div>
  </div>

  <div style="padding: 8px">
    <div style="margin-bottom: 6px">
      <div 
        style="
          margin-bottom: 4px;
          display:flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <label style="min-width: 60px; font-size: 11px;">Search By:</label>
        <div class="w98-select-wrapper">
          <select id="search-type-select">
            <option value="name">Item Name</option>
            <option value="id">Item ID</option>
          </select>
        </div>
      </div>

      <input
        type="text"
        id="search-input"
        class="w98-input"
        placeholder="Enter item name or ID"
        style="width: calc(100% - 12px); padding: 4px; margin-bottom: 4px; border-color: #606060 #dfdfdf #dfdfdf #707070; border-radius: 0px;"
      />

      <button
        id="search-button"
        class="w98-button"
        style="width: 100%; padding: 6px"
      >
        Search
      </button>
    </div>

    <div
      id="search-results"
      style="
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid #000;
        padding: 4px;
        background-color: white;
      "
    >
      <p style="color: #666; text-align: center">
        Enter a search query to find items
      </p>
    </div>
  </div>

  <script>
    (function () {
      const searchInput   = document.getElementById("search-input");
      const searchButton  = document.getElementById("search-button");
      const searchTypeSelect = document.getElementById("search-type-select");
      const searchResults = document.getElementById("search-results");

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function performSearch() {
        const searchType  = searchTypeSelect.value;
        const searchValue = searchInput.value.trim();

        if (!searchValue) {
          searchResults.innerHTML =
            '<p style="color:#666;text-align:center;">Please enter a search query</p>';
          return;
        }

        searchResults.innerHTML =
          '<p style="color:#666;text-align:center;">Searching…</p>';

        const csrfToken = document
          .querySelector('meta[name="csrf-token"]')
          ?.getAttribute("content");
        const headers = { "Content-Type": "application/json" };
        if (csrfToken) headers["X-CSRFToken"] = csrfToken;

        fetch("/osrs/item-search/search", {
          method: "POST",
          headers,
          body: JSON.stringify({ search_type: searchType, search_value: searchValue }),
        })
          .then(r => r.json())
          .then(data => {
            if (data.status === "success") displayResults(data.items);
            else searchResults.innerHTML =
              `<p style="color:red;text-align:center;">Error: ${data.message}</p>`;
            if (window.windowManager) window.windowManager.centerWindow("item-search-window");
          })
          .catch(() => {
            searchResults.innerHTML =
              '<p style="color:red;text-align:center;">An error occurred during search</p>';
          });
      }

      function displayResults(items) {
        if (!items || items.length === 0) {
          searchResults.innerHTML =
            '<p style="color:#666;text-align:center;">No items found</p>';
          return;
        }

        let html = '<div style="display:flex;flex-direction:column;gap:1px;">';
        items.forEach(item => {
          html += `
            <div style="border:1px solid #ccc;padding:4px 8px;background-color:#f9f9f9;">
              <div style="display:flex;justify-content:space-between;margin-bottom:0px;">
                <strong style="font-size:12px;">${escapeHtml(item.name)}</strong>
                <span style="color:#666;font-size:10px;">ID: ${item.id}</span>
              </div>
              ${item.examine ? `<p style="margin:0px;font-size:10px;color:#555;">${escapeHtml(item.examine)}</p>` : ""}
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;font-size:10px;margin: 3px 0px;">
                ${item.value    !== null ? `<div><strong>Value:</strong> ${item.value.toLocaleString()} gp</div>`         : ""}
                ${item.highalch !== null ? `<div><strong>High Alch:</strong> ${item.highalch.toLocaleString()} gp</div>` : ""}
                ${item.lowalch  !== null ? `<div><strong>Low Alch:</strong> ${item.lowalch.toLocaleString()} gp</div>`   : ""}
                ${item.limit    !== null ? `<div><strong>GE Limit:</strong> ${item.limit.toLocaleString()}</div>`         : ""}
                <div><strong>Members:</strong> ${item.members ? "Yes" : "No"}</div>
              </div>
              <div style="margin-top:2px;">
                <button
                  class="w98-button"
                  onclick="openItemGraphWindow(${item.id}, '${escapeHtml(item.name).replace(/\\/g, '\\\\').replace(/'/g, "\\'")}')"
                  style="width:100%;padding:4px;font-size:10px;"
                >
                  Price Data
                </button>
              </div>
            </div>`;
        });
        html += "</div>";
        searchResults.innerHTML = html;
      }

      searchButton.addEventListener("click", performSearch);
      searchInput.addEventListener("keypress", e => { if (e.key === "Enter") performSearch(); });
      searchTypeSelect.addEventListener("change", () => {
        searchInput.placeholder =
          searchTypeSelect.value === "id" ? "Enter item ID" : "Enter item name";
        searchInput.value = "";
        searchResults.innerHTML =
          '<p style="color:#666;text-align:center;">Enter a search query to find items</p>';
      });

      // ── Graph window launcher ─────────────────────────────────────────────

      window.openItemGraphWindow = function (itemId, itemName) {
        var outerId = "price-graph-outer-" + itemId;

        if (document.getElementById(outerId)) {
          if (window.windowManager) window.windowManager.bringToFront(outerId);
          return;
        }

        var csrfMeta  = document.querySelector('meta[name="csrf-token"]');
        var csrfToken = csrfMeta ? csrfMeta.getAttribute("content") : "";

        fetch("/osrs/item-price-graph", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken,
          },
          body: JSON.stringify({ item_id: itemId, item_name: itemName }),
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.status !== "success") {
              console.error("[OSRSGraphs] Failed to load graph:", data.message);
              return;
            }
            new window.OpenWindow(data.html).open(false);
            // Center after OpenWindow's 50ms injection delay; center() retries until layout is ready
            setTimeout(function () {
              if (window.windowManager) window.windowManager.centerWindow("price-graph-outer-" + itemId);
            }, 100);
          })
          .catch(function (e) { console.error("[OSRSGraphs] Network error:", e); });
      };

    })();
  </script>
</div>
